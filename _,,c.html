<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora TDP Histórica (2000-2026)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; font-family: sans-serif; color: #f8fafc; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1.5rem; padding: 1.5rem; }
        select { background: #0f172a; border: 1px solid #475569; color: white; padding: 0.75rem; border-radius: 0.75rem; width: 100%; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-400 italic">PC Power Database 2000-2026</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="space-y-6">
                <div class="card">
                    <label class="block text-blue-400 text-sm font-bold mb-2 uppercase tracking-widest">Procesador (CPU)</label>
                    <select id="cpuSelect" onchange="calculate()"></select>
                </div>

                <div class="card">
                    <label class="block text-emerald-400 text-sm font-bold mb-2 uppercase tracking-widest">Gráfica (GPU)</label>
                    <select id="gpuSelect" onchange="calculate()"></select>
                </div>

                <div class="card">
                    <label class="block text-purple-400 text-sm font-bold mb-2 uppercase tracking-widest">Memoria RAM</label>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="ramType" onchange="calculate()">
                            <option value="3">DDR2 / DDR3 (3W)</option>
                            <option value="4">DDR4 (4W)</option>
                            <option value="6" selected>DDR5 (6W)</option>
                            <option value="12">DDR5 OC/RGB (12W)</option>
                            <option value="15">DDR6 - 2026 (15W)</option>
                        </select>
                        <select id="ramQty" onchange="calculate()">
                            <option value="1">1 Módulo</option>
                            <option value="2" selected>2 Módulos</option>
                            <option value="4">4 Módulos</option>
                        </select>
                    </div>
                </div>

                <div class="card">
                    <label class="block text-amber-400 text-sm font-bold mb-2 uppercase tracking-widest">Almacenamiento</label>
                    <select id="driveSelect" onchange="calculate()">
                        <option value="5">1x SSD SATA / NVMe (5W)</option>
                        <option value="15">1x HDD Antiguo (15W)</option>
                        <option value="20">Múltiples Discos (20W)</option>
                    </select>
                </div>
            </div>

            <div class="flex flex-col justify-center">
                <div class="bg-blue-600 rounded-[2.5rem] p-10 shadow-2xl text-center">
                    <p class="text-blue-100 uppercase text-xs font-bold tracking-widest mb-2">Consumo Total Estimado</p>
                    <div class="text-7xl font-black mb-4"><span id="totalWatts">0</span><span class="text-2xl ml-2">W</span></div>
                    
                    <div class="bg-black/20 rounded-2xl p-4 mt-6 text-left space-y-2">
                        <div class="flex justify-between text-sm">
                            <span>Fuente Recomendada:</span>
                            <span id="psuRec" class="font-bold text-yellow-300">--</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span>Era detectada:</span>
                            <span id="eraTag" class="font-bold text-blue-200">--</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- BASE DE DATOS DE COMPONENTES ---
        // Aquí puedes añadir todos los que quieras fácilmente
        const database = {
            cpus: [
                { name: "Pentium III", tdp: 30, era: "Retro" },
                { name: "Pentium 4 Prescott", tdp: 115, era: "Retro" },
                { name: "Core 2 Quad Q6600", tdp: 105, era: "Retro" },
                { name: "Core i7-4770K", tdp: 84, era: "Moderna" },
                { name: "Ryzen 9 5900X", tdp: 105, era: "Moderna" },
                { name: "Core i9-14900K", tdp: 253, era: "Actual" },
                { name: "Ryzen 9 9950X ", tdp: 170, era: "Actual" },
                { name: "Intel 'Nova Lake'", tdp: 300, era: "Futura" }, 
                { name: "Intel Core 2 Quad Q9650", tdp: 95, era: "Retro" }
            ],
            gpus: [
                { name: "Voodoo 5 5500 (2000)", tdp: 30, era: "Retro" },
                { name: "GeForce 8800 GTX (2006)", tdp: 145, era: "Retro" },
                { name: "GTX 1080 Ti (2017)", tdp: 250, era: "Moderna" },
                { name: "RTX 4090 (2023)", tdp: 450, era: "Actual" },
                { name: "RTX 5090 (Est. 2025)", tdp: 600, era: "Futura" },
                { name: "Titan 'AI Edition' (Est. 2026)", tdp: 800, era: "Futura" },
                { name: "RX 550 QTHREE", tdp: 50, era: "Retro" }
            ]
        };

        // Función para llenar los selectores al abrir la página
        function loadDatabase() {
            const cpuDropdown = document.getElementById('cpuSelect');
            const gpuDropdown = document.getElementById('gpuSelect');

            database.cpus.forEach(item => {
                let opt = document.createElement('option');
                opt.value = item.tdp;
                opt.innerHTML = `${item.name} - ${item.tdp}W`;
                opt.dataset.era = item.era;
                cpuDropdown.appendChild(opt);
            });

            database.gpus.forEach(item => {
                let opt = document.createElement('option');
                opt.value = item.tdp;
                opt.innerHTML = `${item.name} - ${item.tdp}W`;
                gpuDropdown.appendChild(opt);
            });

            calculate();
        }

        // Función principal de cálculo
        function calculate() {
            const cpu = parseInt(document.getElementById('cpuSelect').value);
            const gpu = parseInt(document.getElementById('gpuSelect').value);
            
            // Lógica de RAM (Vatios por módulo * cantidad)
            const ramW = parseInt(document.getElementById('ramType').value);
            const ramQ = parseInt(document.getElementById('ramQty').value);
            const ramTotal = ramW * ramQ;

            const drives = parseInt(document.getElementById('driveSelect').value);
            const mobo = 40; // Consumo base placa base

            const total = cpu + gpu + ramTotal + drives + mobo;

            // Mostrar resultados
            document.getElementById('totalWatts').innerText = total;

            // Recomendación de fuente (Total + 30% margen de seguridad)
            const psu = Math.ceil((total * 1.3) / 50) * 50;
            document.getElementById('psuRec').innerText = (psu < 400 ? 400 : psu) + "W";

            // Detectar era para el tag visual
            const selectedCpu = document.getElementById('cpuSelect');
            const era = selectedCpu.options[selectedCpu.selectedIndex].dataset.era;
            document.getElementById('eraTag').innerText = era;
        }

        // Iniciar
        loadDatabase();
        lucide.createIcons();
    </script>
</body>
</html>
