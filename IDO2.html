<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Tycoon Pro</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #22c55e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar */
        #sidebar { width: 260px; background: #020617; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #334155; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #334155; }
        .stat-val { display: block; font-size: 1.4em; font-weight: bold; color: var(--accent); }

        /* Main Content */
        #main { flex: 1; padding: 30px; overflow-y: auto; }
        .grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; flex: 1; min-width: 300px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

        /* Buttons & Inputs */
        button { 
            background: var(--primary); color: white; border: none; padding: 12px; 
            border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; width: 100%;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #475569; cursor: not-allowed; }

        .tech-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #334155; padding: 10px; margin-bottom: 8px; border-radius: 6px;
        }

        /* Log */
        #log { background: #020617; border-radius: 8px; padding: 15px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 0.9em; color: #94a3b8; margin-top: 20px; }
        .log-new { color: var(--accent); }
    </style>
</head>

</aside>
